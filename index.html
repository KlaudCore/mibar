<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RestoPWA - Gestión de Restaurante</title>

    <!-- 🔥 FAVICON (AGREGADO) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="icon" href="favicon.ico" sizes="16x16">

    <!-- Open Graph para compartir -->
    <meta property="og:title" content="RestoPWA - Gestión de Restaurante" />
    <meta property="og:description" content="Administra mesas, pedidos y menú en tiempo real con Firebase." />
    <meta property="og:image" content="https://klaudcore.github.io/mibar/preview-image.png" />
    <meta property="og:url" content="https://klaudcore.github.io/mibar/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RestoPWA" />
    
    <!-- 🔥 TAMAÑO DE IMAGEN PARA WHATSAPP (AGREGADO) -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RestoPWA - Gestión de Restaurante" />
    <meta name="twitter:description" content="Administra mesas, pedidos y menú en tiempo real con Firebase." />
    <meta name="twitter:image" content="https://klaudcore.github.io/mibar/preview-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png" />

    <!-- CSS externo -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Fuentes y Firebase SDK -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="app-header">
        <div class="logo-area">
            <h1>🍽️ RestoPWA</h1>
            <span class="role-badge" id="currentRoleBadge">Host</span>
        </div>
        <div class="header-actions">
            <button id="requestPermisoBtn" class="permiso-btn" style="display:none;">🔔 Activar notificaciones</button>
            <button id="themeToggleBtn" class="theme-toggle" title="Cambiar tema">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </div>
        <nav class="nav-roles" id="navRoleScope">
            <button class="btn-role" data-role="host" title="Host">
                <div class="pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="4" width="18" height="16" rx="2" ry="2"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <rect x="6" y="9" width="12" height="2"/>
                        <rect x="6" y="13" width="8" height="2"/>
                    </svg>
                    <span class="label">Host</span>
                </div>
            </button>
            <button class="btn-role" data-role="mesero" title="Mesero">
                <div class="pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                        <circle cx="12" cy="13" r="2"/>
                    </svg>
                    <span class="label">Mesero</span>
                </div>
            </button>
            <button class="btn-role" data-role="cocina" title="Cocina">
                <div class="pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        <circle cx="12" cy="8" r="1.5" fill="currentColor"/>
                    </svg>
                    <span class="label">Cocina</span>
                </div>
            </button>
        </nav>
    </div>

    <!-- Contenedor dinámico para las vistas -->
    <div id="viewsContainer"></div>

    <!-- JavaScript externo -->
    <script src="app.js"></script>
</body>
</html>
