<body>
<!-- ... (el mismo HTML del header y navegación) ... -->

<div id="viewsContainer"></div>

<script>
    // ============================================================
    // 🔥 CONFIGURACIÓN DE FIREBASE (proyecto "mibar-52b4d")
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyC-W7aK7ydDVZrC1TkwbQqee9ca9OCbNLM",
        authDomain: "mibar-52b4d.firebaseapp.com",
        databaseURL: "https://mibar-52b4d-default-rtdb.firebaseio.com",
        projectId: "mibar-52b4d",
        storageBucket: "mibar-52b4d.firebasestorage.app",
        messagingSenderId: "256299170602",
        appId: "1:256299170602:web:37c53d203adaace0d83c53"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messaging = firebase.messaging();

    // ============================================================
    // ========== FCM (Notificaciones Push) ==========
    // ============================================================
    async function requestFCMToken() {
        try {
            // Solicitar permiso de notificaciones (ya lo hacemos antes)
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                console.warn('Permiso de notificaciones denegado');
                return;
            }

            // Obtener el token de FCM (esto requiere que el Service Worker de FCM esté registrado)
            const token = await messaging.getToken({
                vapidKey: 'TU_VAPID_KEY' // ✅ OPCIONAL: si usas VAPID, ponlo; si no, puedes omitir.
                // Si no tienes VAPID, FCM usará la clave del proyecto.
            });
            console.log('Token FCM:', token);

            // Guardar el token en Firebase Realtime Database (para poder enviar notificaciones desde un panel)
            db.ref('fcmTokens').push({
                token: token,
                userAgent: navigator.userAgent,
                timestamp: Date.now()
            });

            // Mostrar un mensaje de éxito
            mostrarToast('🔔 Notificaciones push activadas', ['host','mesero','cocina']);
            return token;
        } catch (err) {
            console.error('Error obteniendo token FCM:', err);
        }
    }

    // Registrar el Service Worker de FCM (firebase-messaging-sw.js)
    async function registerFCMSW() {
        try {
            const registration = await navigator.serviceWorker.register('/mibar/firebase-messaging-sw.js');
            console.log('Service Worker de FCM registrado:', registration);
            // Asignar el SW a Firebase Messaging
            await messaging.useServiceWorker(registration);
            // Llamar a la solicitud de token
            await requestFCMToken();
        } catch (err) {
            console.error('Error registrando SW de FCM:', err);
        }
    }

    // ============================================================
    // RESTO DEL CÓDIGO (estado, acciones, renderizado, etc.)
    // ============================================================
    // ... Aquí va todo el código JavaScript que ya tenías (mesas, pedidos, funciones, etc.)
    // ... pero asegúrate de llamar a registerFCMSW() en la inicialización.

    // Inicialización
    async function init() {
        escucharCambios();

        const savedRole = localStorage.getItem("resto_currentRole");
        if (savedRole && ["host","mesero","cocina"].includes(savedRole)) currentRole = savedRole;
        else currentRole = "host";
        document.getElementById("currentRoleBadge").innerText = currentRole === "host" ? "👑 Host" : (currentRole === "mesero" ? "🧑‍🍳 Mesero" : "🍳 Cocina");

        // Registrar el Service Worker de FCM (para notificaciones push)
        await registerFCMSW();

        // Registrar el Service Worker interno (para notificaciones desde la app) - ya lo tienes
        // Pero puedes mantenerlo también.
        await registerServiceWorker(); // esta es la que ya tenías

        initRoleButtons();

        document.getElementById("requestPermisoBtn").addEventListener("click", solicitarPermisoNotificaciones);
        initTheme();
    }

    init();
</script>
</body>
</html>
